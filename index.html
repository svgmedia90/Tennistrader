<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Traders</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #000000, #0f2027);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Container */
.container {
    text-align: center;
    animation: fadeIn 1.5s ease;
}

/* Logo */
.logo {
    width: 130px;
    margin-bottom: 20px;
    animation: glow 2s infinite alternate;
}

/* Channel Name */
.channel-name {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 14px 35px;
    background: linear-gradient(45deg, #00ffcc, #00ccff);
    color: black;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00ffcc;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes glow {
    from {filter: drop-shadow(0 0 5px #00ffcc);}
    to {filter: drop-shadow(0 0 20px #00ffcc);}
}
</style>

</head>

<body>

<div class="container">
    <!-- LOGO -->
    <img src="logo.png" alt="Logo" class="logo">

    <!-- CHANNEL NAME -->
    <h1 class="channel-name">Tennis Traders</h1>

    <!-- BUTTON -->
    <a href="https://t.me/yourlink" class="btn">Join Telegram</a>
</div>

</body>
</html>
