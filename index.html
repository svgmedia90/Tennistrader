<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Landing</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: #fff;
      overflow: hidden;
    }

    /* ===== LOADER ===== */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 5px solid rgba(255,255,255,0.1);
      border-top: 5px solid #00f7ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 25px #00f7ff;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== MAIN ===== */
    .main {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Background glow */
    .bg1, .bg2 {
      position: absolute;
      width: 400px;
      height: 400px;
      filter: blur(120px);
      z-index: -1;
    }

    .bg1 {
      background: #00f7ff55;
      top: -100px;
      left: -100px;
    }

    .bg2 {
      background: #ff00cc55;
      bottom: -100px;
      right: -100px;
    }

    /* LOGO CENTER */
    .logo {
      width: 140px;
      border-radius: 50%;
      box-shadow: 0 0 30px #00f7ff;
      margin-bottom: 25px;
      animation: zoomIn 1s ease;
    }

    @keyframes zoomIn {
      from {transform: scale(0.6); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(90deg, #00f7ff, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
      max-width: 350px;
    }

    /* BUTTON */
    .btn {
      padding: 15px 40px;
      border-radius: 50px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      background: linear-gradient(90deg, #00f7ff, #ff00cc);
      box-shadow: 0 0 25px #00f7ff;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px #ff00cc;
    }

    .features {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #888;
    }

    .features span {
      display: block;
      margin: 5px 0;
    }

  </style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent">

  <div class="bg1"></div>
  <div class="bg2"></div>

  <!-- LOGO -->
  <img src="logo.png" class="logo" alt="logo">

  <h1>Elite Prediction Hub</h1>
  <p>Join the most trusted premium platform for accurate predictions & winning strategies.</p>

  <!-- BUTTON -->
  <a href="https://t.me/+xgt4Qg-J-Vc1NzA1" target="_blank" class="btn">
    Join Telegram
  </a>

  <div class="features">
    <span>✔ High Accuracy Signals</span>
    <span>✔ VIP Premium Access</span>
    <span>✔ Daily Profit System</span>
  </div>

</div>

<script>
  // Loader control
  window.onload = function() {
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
      document.getElementById("mainContent").style.display = "flex";
      document.body.style.overflow = "auto";
    }, 1800); // loader time
  }
</script>

</body>
</html>
